<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>og</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1200px;height:630px}
    body{
      background:#0a0a0b;color:#f3f1ed;position:relative;overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,"Helvetica Neue",Arial,sans-serif;
    }
    .glow{position:absolute;inset:0;
      background:radial-gradient(640px 420px at 86% -8%,rgba(255,90,44,.24),transparent 66%),
        radial-gradient(520px 380px at -6% 108%,rgba(255,90,44,.11),transparent 70%)}
    .grid{position:absolute;inset:0;
      background-image:radial-gradient(rgba(243,241,237,.05) 1.4px,transparent 1.4px);
      background-size:40px 40px;
      -webkit-mask-image:linear-gradient(125deg,#000,transparent 72%)}
    .bull{position:absolute;top:-70px;right:-46px;width:540px;color:#ff5a2c;opacity:.07}
    .wrap{position:relative;height:100%;display:flex;align-items:center;
      justify-content:space-between;gap:56px;padding:0 84px}
    .eyebrow{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:21px;font-weight:600;letter-spacing:.26em;color:#ff5a2c;margin-bottom:26px}
    h1{font-size:106px;line-height:.97;font-weight:800;letter-spacing:-.045em}
    .bar{width:104px;height:9px;border-radius:6px;background:#ff5a2c;margin:32px 0 30px}
    .role{font-size:37px;font-weight:600;letter-spacing:-.022em}
    .tech{font-size:25px;color:#a4a09a;margin-top:12px;letter-spacing:-.01em}
    .ava{width:344px;height:344px;border-radius:50%;object-fit:cover;
      border:5px solid #ff5a2c;box-shadow:0 0 0 15px rgba(255,90,44,.13)}
    .foot{position:absolute;left:84px;bottom:52px;display:flex;align-items:center;gap:13px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:21px;color:#a4a09a;letter-spacing:.02em}
    .dot{width:12px;height:12px;border-radius:50%;background:#3ddc84;
      box-shadow:0 0 0 5px rgba(61,220,132,.16)}
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid"></div>
  <svg class="bull" viewBox="0 0 100 100" fill="currentColor" aria-hidden="true">
    <path d="M13 24Q50 60 87 24Q50 80 13 24Z"/>
    <path d="M32 47Q50 42 68 47Q71 62 62 79Q50 87 38 79Q29 62 32 47Z"/>
    <path d="M33 52Q21 52 20 63Q29 63 37 57Z"/>
    <path d="M67 52Q79 52 80 63Q71 63 63 57Z"/>
  </svg>
  <div class="wrap">
    <div class="left">
      <div class="eyebrow">KARABOGA.DEV</div>
      <h1>Cihat<br>Karaboğa</h1>
      <div class="bar"></div>
      <div class="role">Mobile Software Engineer</div>
      <div class="tech">Flutter &amp; Dart · iOS &amp; Android apps</div>
    </div>
    <div class="right">
      <img class="ava" src="avatar.jpg" alt="">
    </div>
  </div>
  <div class="foot"><span class="dot"></span>Available for work · Türkiye</div>
</body>
</html>
