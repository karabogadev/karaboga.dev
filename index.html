  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0 }

    :root {
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, "Helvetica Neue", Arial, sans-serif;
      --transition: .18s ease;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --ink: #16150f;
      --ink-2: #6b6862;
      --border: rgba(0,0,0,.14);
      color-scheme: light;
    }

    [data-theme="dark"] {
      --bg: #0e0e0d;
      --ink: #f5f5f4;
      --ink-2: #8d8a83;
      --border: rgba(255,255,255,.18);
      color-scheme: dark;
    }

    html { -webkit-text-size-adjust: 100% }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    a { color: inherit }
    ::selection { background: var(--ink); color: var(--bg) }
    :focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; border-radius: 3px }

    /* ---- theme toggle ---- */
    .theme-btn {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      width: 2.25rem;
      height: 2.25rem;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--ink-2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: color var(--transition);
    }
    .theme-btn:hover { color: var(--ink) }
    .theme-btn svg { width: 1.15rem; height: 1.15rem }
    .icon-sun { display: none }
    [data-theme="dark"] .icon-sun { display: block }
    [data-theme="dark"] .icon-moon { display: none }

    /* ---- content ---- */
    main {
      max-width: 30rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -.02em;
    }

    .role {
      font-size: 1rem;
      color: var(--ink-2);
      margin-top: .15rem;
    }

    .bio {
      font-size: 1rem;
      color: var(--ink-2);
      margin-top: 1.5rem;
      line-height: 1.7;
    }

    /* ---- links ---- */
    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .links a {
      font-size: .95rem;
      color: var(--ink-2);
      text-decoration: none;
      transition: color var(--transition);
    }
    .links a:hover { color: var(--ink) }

    /* ---- footer ---- */
    footer {
      position: fixed;
      bottom: 1.25rem;
      left: 0;
      right: 0;
      font-size: .8rem;
      color: var(--ink-2);
    }

    @media (prefers-reduced-motion: reduce) {
      *,*::before,*::after { transition: none !important }
    }

  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      var html = document.documentElement;
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      html.setAttribute('data-theme', stored || (prefersDark ? 'dark' : 'light'));

      btn.addEventListener('click', function () {
        var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();
  </script>
