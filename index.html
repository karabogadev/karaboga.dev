  <!-- set theme before paint to avoid flash -->
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      var meta = document.getElementById('theme-color');
      if (meta) meta.content = theme === 'dark' ? '#0e0e0d' : '#fbfbfa';
    })();
  </script>

  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0 }

    :root {
      --font: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, "Helvetica Neue", Arial, sans-serif;
      --wrap: 42rem;
      --pad: clamp(1.25rem, 5vw, 2rem);
      --transition: .18s ease;
    }

    [data-theme="light"] {
      --bg: #fbfbfa;
      --ink: #16150f;
      --ink-2: #6b6862;
      --border: rgba(0,0,0,.12);
      color-scheme: light;
    }

    [data-theme="dark"] {
      --bg: #0e0e0d;
      --ink: #f5f5f4;
      --ink-2: #8d8a83;
      --border: rgba(255,255,255,.14);
      color-scheme: dark;
    }

    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.65;
      letter-spacing: -.011em;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit }
    ::selection { background: var(--ink); color: var(--bg) }
    :focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; border-radius: 3px }

    .skip {
      position: absolute; left: -9999px; top: 0; z-index: 100;
      background: var(--ink); color: var(--bg);
      padding: .5rem 1rem; font-weight: 600; border-radius: 0 0 .4rem 0;
    }
    .skip:focus { left: 0 }

    /* constrained container — used by header, sections and footer */
    .wrap {
      width: 100%;
      max-width: var(--wrap);
      margin-inline: auto;
      padding-inline: var(--pad);
    }

    /* ---- header ---- */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-block: .85rem;
    }
    .brand {
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: -.02em;
      text-decoration: none;
      color: var(--ink);
    }

    /* ---- theme toggle ---- */
    .theme-btn {
      width: 2rem;
      height: 2rem;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-2);
      transition: color var(--transition);
    }
    .theme-btn:hover { color: var(--ink) }
    .theme-btn svg { width: 1.1rem; height: 1.1rem }
    .icon-sun { display: none }
    [data-theme="dark"] .icon-sun { display: block }
    [data-theme="dark"] .icon-moon { display: none }

    /* ---- sections ---- */
    main { flex: 1 }
    .section { padding-block: clamp(2.25rem, 6vw, 3.5rem) }
    .section + .section { border-top: 1px solid var(--border) }
    .intro { padding-top: clamp(3rem, 9vw, 5rem) }

    .section-title {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -.022em;
      margin-bottom: 1.1rem;
    }

    /* ---- intro ---- */
    h1 {
      font-size: clamp(1.7rem, 5vw, 2.3rem);
      font-weight: 600;
      letter-spacing: -.035em;
      line-height: 1.15;
    }
    .role {
      font-size: 1rem;
      color: var(--ink-2);
      margin-top: .25rem;
    }
    .bio {
      font-size: 1rem;
      color: var(--ink-2);
      max-width: 44ch;
      margin-top: 1.4rem;
      line-height: 1.7;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 1.4rem;
      margin-top: 1.8rem;
    }
    .links a {
      font-size: .95rem;
      color: var(--ink-2);
      text-decoration: none;
      transition: color var(--transition);
    }
    .links a:hover { color: var(--ink) }

    /* ---- footer ---- */
    .site-footer { border-top: 1px solid var(--border) }
    .footer-inner {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: .35rem 1.5rem;
      padding-block: 1.5rem;
      font-size: .8rem;
      color: var(--ink-2);
    }

    /* ---- entrance ---- */
    @keyframes up { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: none } }
    .intro h1 { animation: up .5s .04s ease backwards }
    .intro .role { animation: up .5s .1s ease backwards }
    .intro .bio { animation: up .5s .16s ease backwards }
    .intro .links { animation: up .5s .22s ease backwards }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto }
      *,*::before,*::after { animation: none !important; transition: none !important }
    }
  </style>

  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      var html = document.documentElement;
      var meta = document.getElementById('theme-color');
      btn.addEventListener('click', function () {
        var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        if (meta) meta.content = next === 'dark' ? '#0e0e0d' : '#fbfbfa';
      });
    })();
  </script>
